<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d47a1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ค่างวด">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>คำนวณค่างวด</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #0d47a1;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 620px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
      padding: 32px 16px 24px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s, box-shadow 0.18s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border: 2.5px solid transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
      border-color: var(--accent);
    }

    .card .icon {
      font-size: 3rem;
      line-height: 1;
    }

    .card .name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #222;
    }

    .card .desc {
      font-size: 0.78rem;
      color: #888;
      line-height: 1.4;
    }

    .card.fridge   { --accent: #1a73e8; }
    .card.washer   { --accent: #00897b; }
    .card.freezer  { --accent: #5e35b1; }
    .card.tv       { --accent: #e53935; }
    .card.ac       { --accent: #0288d1; }

    .card.fridge   .icon-wrap { background: #e8f0fe; }
    .card.washer   .icon-wrap { background: #e0f2f1; }
    .card.freezer  .icon-wrap { background: #ede7f6; }
    .card.tv       .icon-wrap { background: #fce4ec; }
    .card.ac       .icon-wrap { background: #e1f5fe; }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .footer {
      margin-top: 40px;
      color: #aaa;
      font-size: 0.82rem;
    }

    .settings-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 8px 18px;
      background: white;
      border: 1.5px solid #dde1e7;
      border-radius: 20px;
      color: #555;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.18s;
    }
    .settings-link:hover {
      border-color: #1a73e8;
      color: #1a73e8;
      box-shadow: 0 2px 8px rgba(26,115,232,0.12);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>คำนวณค่างวด</h1>
    <p>เลือกประเภทสินค้าที่ต้องการคำนวณ</p>
    <a class="settings-link" href="settings.html">⚙️ ตั้งค่าสูตรคำนวณ</a>
  </div>

  <div class="grid">
    <a class="card fridge" href="calculator.html?product=ตู้เย็น">
      <div class="icon-wrap">🧊</div>
      <div class="name">ตู้เย็น</div>
      <div class="desc">ทุน + % ÷ งวด</div>
    </a>

    <a class="card washer" href="calculator.html?product=เครื่องซักผ้า">
      <div class="icon-wrap">🫧</div>
      <div class="name">เครื่องซักผ้า</div>
      <div class="desc">ทุน + % ÷ งวด</div>
    </a>

    <a class="card freezer" href="calculator.html?product=ตู้แช่">
      <div class="icon-wrap">❄️</div>
      <div class="name">ตู้แช่</div>
      <div class="desc">ทุน + % ÷ งวด</div>
    </a>

    <a class="card tv" href="calculator.html?product=ทีวี">
      <div class="icon-wrap">📺</div>
      <div class="name">ทีวี</div>
      <div class="desc">ทุน + ประกันหน้าจอ + % ÷ งวด</div>
    </a>

    <a class="card ac" href="calculator.html?product=แอร์">
      <div class="icon-wrap">💨</div>
      <div class="name">แอร์</div>
      <div class="desc">ทุน + BTU + % + ค่าติดตั้ง ÷ งวด</div>
    </a>
  </div>

  <div class="footer">ค่างวดจะถูกปัดให้ลงท้ายด้วย 90 เสมอ</div>

  <div id="install-banner" style="display:none; margin-top:20px;">
    <button id="install-btn" style="
      padding: 12px 28px; background: #0d47a1; color: white;
      border: none; border-radius: 24px; font-size: 0.95rem;
      cursor: pointer; box-shadow: 0 4px 14px rgba(13,71,161,0.35);
      font-family: inherit;
    ">📲 ติดตั้งแอปบนมือถือ</button>
  </div>

  <script>
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'block';
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('install-banner').style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
